<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#151520"/>
    </linearGradient>
    <linearGradient id="pumpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Glow circle -->
  <circle cx="100" cy="95" r="55" fill="rgba(255,140,0,0.06)"/>

  <!-- Pump body -->
  <rect x="62" y="70" width="52" height="72" rx="6" fill="url(#pumpGrad)" filter="url(#glow)"/>
  
  <!-- Pump screen -->
  <rect x="70" y="78" width="36" height="22" rx="3" fill="#0a0a0f"/>
  <text x="88" y="93" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="900" fill="#ff8c00">L/100</text>

  <!-- Pump bottom detail -->
  <rect x="68" y="108" width="40" height="4" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="72" y="116" width="12" height="18" rx="2" fill="rgba(0,0,0,0.25)"/>
  <rect x="92" y="116" width="12" height="18" rx="2" fill="rgba(0,0,0,0.25)"/>

  <!-- Nozzle arm -->
  <path d="M114 82 Q130 82 130 95 L130 108" stroke="#ff8c00" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Nozzle head -->
  <rect x="124" y="108" width="12" height="20" rx="4" fill="#ff8c00" filter="url(#glow)"/>
  <rect x="126" y="128" width="8" height="6" rx="2" fill="#ff6600"/>

  <!-- Fuel drops -->
  <ellipse cx="130" cy="142" rx="3" ry="4" fill="#ff8c00" opacity="0.8"/>
  <ellipse cx="128" cy="151" rx="2" ry="3" fill="#ff8c00" opacity="0.5"/>
  <ellipse cx="131" cy="158" rx="1.5" ry="2" fill="#ff8c00" opacity="0.3"/>

  <!-- Text -->
  <text ="100" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="900" letter-spacing="4" fill="#ff8c00" filter="url(#glow)">FUEL</text>
  <text x="100" y="182" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="400" letter-spacing="6" fill="#555">TRACKER</text>
</svg>